<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AnatomyOS — 3D Heart Explorer</title>
  <meta name="description" content="Interactive 3D anatomy explorer for medical students. Dive from organ to organelle through real anatomical structures.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <style>
    /* ── TOKENS ──────────────────────────────────── */
    :root {
      --bg:           #060810;
      --surface:      rgba(9, 12, 22, 0.84);
      --border:       rgba(255, 255, 255, 0.07);
      --border-hi:    rgba(220, 38, 38, 0.4);
      --accent:       #dc2626;
      --accent-glow:  rgba(220, 38, 38, 0.35);
      --accent-light: #f87171;
      --text:         #f1f5f9;
      --text-muted:   #94a3b8;
      --text-dim:     #475569;
      --radius:       12px;
      --blur:         blur(22px);
    }

    /* ── RESET ───────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Inter', -apple-system, sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    button { font-family: inherit; }

    /* ── CANVAS ──────────────────────────────────── */
    #canvas-wrap { position: fixed; inset: 0; z-index: 0; }
    canvas { display: block; }

    /* ── LOADING ─────────────────────────────────── */
    #loading {
      position: fixed; inset: 0; z-index: 500;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--bg);
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }
    #loading.done { opacity: 0; visibility: hidden; }

    .ld-emoji {
      font-size: 80px; margin-bottom: 28px;
      filter: drop-shadow(0 0 36px rgba(220,38,38,0.7));
      animation: beat 0.9s ease-in-out infinite;
    }
    @keyframes beat {
      0%,100% { transform: scale(1); }
      15%      { transform: scale(1.2); }
      30%      { transform: scale(1.0); }
      45%      { transform: scale(1.12); }
      65%      { transform: scale(1.0); }
    }
    .ld-title { font-size: 30px; font-weight: 700; letter-spacing: -1px; margin-bottom: 8px; }
    .ld-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 44px; }
    .ld-track {
      width: 230px; height: 2px;
      background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden;
    }
    .ld-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-light));
      border-radius: 99px;
      animation: fill 1.5s ease-out forwards;
    }
    @keyframes fill { from { width: 0; } to { width: 100%; } }

    /* ── HEADER ──────────────────────────────────── */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 28px;
      background: linear-gradient(180deg, rgba(6,8,16,.92) 0%, transparent 100%);
      pointer-events: none;
    }
    header > * { pointer-events: auto; }

    .logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; color: var(--text);
    }
    .logo-mark {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, #b91c1c, #ef4444);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 0 1px rgba(239,68,68,.3), 0 0 26px rgba(185,28,28,.55);
      animation: logo-glow 2.5s ease-in-out infinite;
    }
    @keyframes logo-glow {
      0%,100% { box-shadow: 0 0 0 1px rgba(239,68,68,.3), 0 0 26px rgba(185,28,28,.55); }
      50%      { box-shadow: 0 0 0 1px rgba(239,68,68,.5), 0 0 42px rgba(185,28,28,.8); }
    }
    .logo-text { font-size: 17px; font-weight: 700; letter-spacing: -.5px; }

    /* breadcrumb */
    #breadcrumb { display: flex; align-items: center; gap: 4px; font-size: 13px; font-weight: 500; }
    .bc-item {
      padding: 5px 10px; border-radius: 8px; cursor: pointer;
      color: var(--text-muted); transition: background .2s, color .2s; white-space: nowrap;
    }
    .bc-item:hover { background: rgba(255,255,255,.07); color: var(--text); }
    .bc-item.current { color: var(--accent-light); }
    .bc-sep { color: var(--text-dim); font-size: 12px; user-select: none; }

    .phase-pill {
      font-size: 11px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase;
      color: var(--accent-light);
      background: rgba(220,38,38,.15); border: 1px solid rgba(220,38,38,.3);
      border-radius: 99px; padding: 5px 14px;
    }

    /* ── SIDEBAR ─────────────────────────────────── */
    #sidebar {
      position: fixed; left: 24px; top: 50%; transform: translateY(-50%);
      z-index: 100; width: 215px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .sb-label {
      font-size: 10px; font-weight: 600; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--text-dim);
      padding: 0 4px; margin-bottom: 4px;
    }
    .sb-btn {
      all: unset;
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); cursor: pointer;
      backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      transition: transform .22s, border-color .22s, background .22s;
    }
    .sb-btn:hover {
      background: rgba(14,18,34,.9); border-color: rgba(220,38,38,.3);
      transform: translateX(4px);
    }
    .sb-btn.active {
      background: rgba(220,38,38,.12); border-color: rgba(220,38,38,.5);
      transform: translateX(6px);
    }
    .sb-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; transition: box-shadow .3s; }
    .sb-btn.active .sb-dot { box-shadow: 0 0 12px var(--accent); }
    .sb-btn:hover .sb-dot  { box-shadow: 0 0 8px  var(--accent-light); }
    .sb-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sb-level { font-size: 10px; color: var(--text-dim); text-transform: capitalize; }

    /* ── INFO PANEL ──────────────────────────────── */
    #info-panel {
      position: fixed; right: 24px; top: 50%;
      transform: translateY(-50%) translateX(30px);
      z-index: 100; width: 335px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px;
      backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      opacity: 0; pointer-events: none;
      transition: opacity .35s ease, transform .35s cubic-bezier(.34,1.56,.64,1);
    }
    #info-panel.open { opacity: 1; transform: translateY(-50%) translateX(0); pointer-events: auto; }

    .ip-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 10px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; padding: 4px 12px;
      border-radius: 99px; margin-bottom: 14px;
    }
    .ip-badge.organ    { background: rgba(220,38,38,.15); color: #fca5a5; border: 1px solid rgba(220,38,38,.35); }
    .ip-badge.region   { background: rgba(37,99,235,.15); color: #93c5fd; border: 1px solid rgba(37,99,235,.35); }
    .ip-badge.tissue   { background: rgba(16,185,129,.15); color: #6ee7b7; border: 1px solid rgba(16,185,129,.35); }
    .ip-badge.cell     { background: rgba(139,92,246,.15); color: #c4b5fd; border: 1px solid rgba(139,92,246,.35); }

    .ip-name { font-size: 22px; font-weight: 700; letter-spacing: -.5px; line-height: 1.15; margin-bottom: 4px; }
    .ip-latin { font-size: 13px; font-style: italic; color: var(--text-muted); margin-bottom: 18px; }
    .ip-div { height: 1px; background: var(--border); margin: 14px 0; }
    .ip-sec { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 7px; }
    .ip-text { font-size: 13px; line-height: 1.7; color: var(--text-muted); }

    .ip-clinical {
      display: flex; gap: 10px; align-items: flex-start;
      background: rgba(220,38,38,.07); border: 1px solid rgba(220,38,38,.18);
      border-radius: 10px; padding: 11px 13px;
    }
    .ip-clinical-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
    .ip-clinical-text { font-size: 12px; line-height: 1.65; color: var(--text-muted); }

    .ip-actions { margin-top: 18px; display: flex; flex-direction: column; gap: 8px; }

    .btn-dive {
      all: unset;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #b91c1c, #dc2626);
      border-radius: 10px; color: #fff; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all .2s;
      box-shadow: 0 4px 20px rgba(185,28,28,.4); text-align: center;
    }
    .btn-dive:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(185,28,28,.55); }
    .btn-dive:active { transform: translateY(0); }

    .btn-back {
      all: unset;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; padding: 10px;
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text-muted); font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all .2s; text-align: center;
    }
    .btn-back:hover { background: rgba(255,255,255,.05); color: var(--text); border-color: rgba(255,255,255,.15); }

    /* ── ZOOM LEVELS ─────────────────────────────── */
    #zoom-levels {
      position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%);
      z-index: 100; display: flex; align-items: center;
    }
    .zl-item {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 12px; font-size: 11px; font-weight: 500;
      color: var(--text-dim); border-bottom: 2px solid transparent;
      transition: all .3s; user-select: none;
    }
    .zl-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; transition: all .3s; }
    .zl-item.active { color: var(--accent-light); border-bottom-color: var(--accent); }
    .zl-item.active .zl-dot { box-shadow: 0 0 6px currentColor; }

    /* ── BOTTOM HUD ───────────────────────────────── */
    #hud {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      z-index: 100; display: flex; align-items: center; gap: 10px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 99px; padding: 8px 20px;
      backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      white-space: nowrap;
    }
    .hud-text { font-size: 12px; color: var(--text-dim); }
    .hud-key { font-size: 10px; font-weight: 600; background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12); border-radius: 5px; padding: 2px 7px; color: var(--text-muted); }
    .hud-sep { width: 1px; height: 16px; background: var(--border); }

    /* ── ECG CANVAS ───────────────────────────────── */
    #ecg {
      position: fixed; bottom: 0; left: 0; width: 100%; height: 52px;
      z-index: 50; opacity: 0.4; pointer-events: none;
    }

    /* ── TOOLTIP ──────────────────────────────────── */
    #tooltip {
      position: fixed; z-index: 200; pointer-events: none;
      opacity: 0; transition: opacity .15s;
      background: rgba(9,12,22,.96); border: 1px solid rgba(255,255,255,.1);
      border-radius: 8px; padding: 6px 12px;
      font-size: 12px; font-weight: 500; color: var(--text);
      white-space: nowrap; backdrop-filter: blur(10px);
    }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="ld-emoji">🫀</div>
  <div class="ld-title">AnatomyOS</div>
  <div class="ld-sub">Building cardiac model…</div>
  <div class="ld-track"><div class="ld-fill"></div></div>
</div>

<!-- Tooltip -->
<div id="tooltip"></div>

<!-- Three.js Canvas -->
<div id="canvas-wrap">
  <canvas id="main-canvas"></canvas>
</div>

<!-- ECG Canvas -->
<canvas id="ecg"></canvas>

<!-- Header -->
<header>
  <a class="logo" href="#">
    <div class="logo-mark">🫀</div>
    <span class="logo-text">AnatomyOS</span>
  </a>
  <div id="breadcrumb"></div>
  <div class="phase-pill">Phase 0 · PoC</div>
</header>

<!-- Sidebar -->
<div id="sidebar">
  <div class="sb-label">Structures</div>
</div>

<!-- Info Panel -->
<div id="info-panel">
  <div class="ip-badge organ" id="ip-badge">🫀 Organ</div>
  <div class="ip-name"  id="ip-name">Heart</div>
  <div class="ip-latin" id="ip-latin">Cor</div>
  <div class="ip-div"></div>
  <div class="ip-sec">Function</div>
  <div class="ip-text" id="ip-fn"></div>
  <div class="ip-div"></div>
  <div class="ip-sec">Clinical Correlation</div>
  <div class="ip-clinical">
    <span class="ip-clinical-icon">⚕️</span>
    <span class="ip-clinical-text" id="ip-clin"></span>
  </div>
  <div class="ip-actions">
    <button class="btn-dive" id="btn-dive">🔬 Dive Deeper</button>
    <button class="btn-back" id="btn-back" style="display:none">← Back to Heart</button>
  </div>
</div>

<!-- Zoom levels -->
<div id="zoom-levels">
  <div class="zl-item active" data-level="organ"><div class="zl-dot"></div>Organ</div>
  <div class="zl-item" data-level="region"><div class="zl-dot"></div>Region</div>
  <div class="zl-item" data-level="tissue"><div class="zl-dot"></div>Tissue</div>
  <div class="zl-item" data-level="cell"><div class="zl-dot"></div>Cell</div>
  <div class="zl-item" data-level="organelle"><div class="zl-dot"></div>Organelle</div>
</div>

<!-- HUD -->
<div id="hud">
  <span class="hud-text">Click a structure to explore</span>
  <div class="hud-sep"></div>
  <span class="hud-key">scroll</span><span class="hud-text">zoom</span>
  <div class="hud-sep"></div>
  <span class="hud-key">drag</span><span class="hud-text">rotate</span>
  <div class="hud-sep"></div>
  <span class="hud-key">R</span><span class="hud-text">reset</span>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ════════════════════════════════════════════════════
   ANATOMY DATA
   ════════════════════════════════════════════════════ */
const DATA = {
  heart: {
    id:'heart', name:'Heart', latinName:'Cor', level:'organ', color:'#8b1a1a',
    function:'The heart is a hollow muscular pump that drives blood through ~60,000 miles of vessels. It beats ~100,000 times/day, generating 5–7 L/min of cardiac output at rest and up to 25 L/min during exercise.',
    clinical:'Coronary artery disease is the #1 cause of global mortality. Myocardial infarction occurs when atherosclerotic plaque ruptures, acutely blocking coronary flow to cardiomyocytes.',
    children:['left-ventricle','right-ventricle','left-atrium','right-atrium','aorta','pulmonary-artery']
  },
  'left-ventricle': {
    id:'left-ventricle', name:'Left Ventricle', latinName:'Ventriculus sinister', level:'region', color:'#dc2626',
    function:'The dominant systemic pump. Ejects oxygenated blood into the aorta at ~120 mmHg (systolic). Wall thickness 8–12mm vs 3–5mm in the RV. Generates ~70% of total cardiac work.',
    clinical:'Ejection fraction < 40% = HFrEF (systolic failure). LV hypertrophy is a marker of chronic hypertension. Biomarkers: BNP/NT-proBNP elevation correlates with LV wall stress.',
    tissue:{ name:'Myocardium', latinName:'Myocardium sinistrum', level:'tissue',
      function:'Cardiac muscle arranged in spiral bundles. Cardiomyocytes are ~100 μm long, striated, with a single central nucleus. Mitochondria occupy ~30% of cell volume for constant ATP generation via oxidative phosphorylation.',
      clinical:'Myocardial fibrosis is a substrate for re-entrant arrhythmia and heart failure. Detected by late gadolinium enhancement (LGE) on cardiac MRI. RAAS blockade slows fibrotic remodeling.' }
  },
  'right-ventricle': {
    id:'right-ventricle', name:'Right Ventricle', latinName:'Ventriculus dexter', level:'region', color:'#991b1b',
    function:'Crescent-shaped pump with thin walls (3–5mm). Propels deoxygenated blood to pulmonary circulation at low pressure (~25/10 mmHg). Shares the interventricular septum (IVS) with the LV.',
    clinical:'RV infarction from proximal RCA occlusion → triad: hypotension + JVD + clear lungs. Critical: maintain preload, avoid nitrates and diuretics, consider reperfusion.',
    tissue:{ name:'RV Myocardium', latinName:'Myocardium dextrum', level:'tissue',
      function:'Two-layer muscle arrangement vs. LV\'s three-layer spiral. Highly sensitive to afterload increases — even modest pulmonary hypertension causes RV dilation and failure. Lower mitochondrial density reflects lower baseline O₂ demand.',
      clinical:'ARVC (arrhythmogenic RV cardiomyopathy): fibro-fatty replacement of RV myocardium from desmosome mutations (PKP2, DSP). Presents as sudden cardiac death in athletes. Task Force Criteria for diagnosis.' }
  },
  'left-atrium': {
    id:'left-atrium', name:'Left Atrium', latinName:'Atrium sinistrum', level:'region', color:'#ef4444',
    function:'Receives oxygenated blood from 4 pulmonary veins. Functions as a reservoir during LV systole and conduit during diastole. The "atrial kick" contributes 20–30% of LV filling — critical in diastolic dysfunction.',
    clinical:'AF most commonly triggers from pulmonary vein ectopic foci. LA diameter > 4 cm predicts persistent AF and stroke. CHA₂DS₂-VASc score guides anticoagulation decision.',
    tissue:{ name:'Atrial Myocardium', latinName:'Myocardium atriale', level:'tissue',
      function:'Thin wall (2–3mm) with pectinate muscles in the LA appendage. Stretch-sensitive ion channels modulate electrical conduction. Pulmonary vein sleeve myocardium is the most common AF trigger site.',
      clinical:'Atrial fibrosis by LGE-MRI (UTAH staging I–IV) predicts AF ablation failure. Fibrosis slows and fragments atrial conduction velocity, promoting re-entry.' }
  },
  'right-atrium': {
    id:'right-atrium', name:'Right Atrium', latinName:'Atrium dextrum', level:'region', color:'#f87171',
    function:'Receives deoxygenated blood from SVC, IVC, and coronary sinus. Houses the sinoatrial (SA) node in the crista terminalis — the heart\'s primary pacemaker at 60–100 bpm, regulated by autonomic tone.',
    clinical:'Sick sinus syndrome: bradycardia + tachy-brady due to SA node fibrosis. Sick sinus is the most common reason for permanent pacemaker implantation in the elderly.',
    tissue:{ name:'SA Node & Crista Terminalis', latinName:'Nodus sinoatrialis', level:'tissue',
      function:'SA nodal cells depolarize spontaneously via the HCN4-mediated "funny current" (If). Phase 4 automaticity rate is 60–100 bpm; modified by β1-adrenergic (↑HR) and M2-muscarinic (↓HR) signaling.',
      clinical:'HCN4 gain-of-function mutations cause familial tachycardia. Ivabradine selectively blocks If, reducing HR without affecting myocardial contractility — used in HFrEF and stable angina.' }
  },
  'aorta': {
    id:'aorta', name:'Aorta', latinName:'Aorta', level:'region', color:'#fca5a5',
    function:'The body\'s largest artery (2.5–3.5 cm diameter). Ascends from the LV, gives off coronary ostia, arches to give off brachiocephalic branches, then descends. Elastic walls provide the Windkessel effect, sustaining diastolic pressure.',
    clinical:'AAA > 5.5 cm → surgical/endovascular repair (EVAR). Aortic dissection (Stanford A/B): mortality increases ~1%/hr without treatment. Marfan/Loeys-Dietz syndrome → ascending root dilation from fibrillin mutations.',
    tissue:{ name:'Tunica Media', latinName:'Tunica media aortae', level:'tissue',
      function:'Contains 40–70 concentric elastic lamellae + smooth muscle cells. Elastic recoil stores ~50% of LV stroke work, releasing it during diastole to maintain coronary and cerebral perfusion — the Windkessel mechanism.',
      clinical:'Cystic medial necrosis (Erdheim): fragmentation of elastic lamellae + loss of smooth muscle cells, seen in Marfan/Ehlers-Danlos. Predisposes to dissection even in normotensive young patients.' }
  },
  'pulmonary-artery': {
    id:'pulmonary-artery', name:'Pulmonary Artery', latinName:'Arteria pulmonalis', level:'region', color:'#60a5fa',
    function:'The sole artery carrying deoxygenated blood (PO₂ ~40 mmHg). Bifurcates into left and right branches. Normal mean pulmonary arterial pressure (mPAP) < 20 mmHg — approximately 1/6th of systemic pressure.',
    clinical:'Pulmonary embolism (PE): saddle embolus causes acute cor pulmonale — massive PE mortality ~25%. Pulmonary arterial hypertension (PAH) mPAP > 20 at rest with PVR > 2 WU → progressive RV failure.',
    tissue:{ name:'Pulmonary Media', latinName:'Tunica media arteriae pulmonalis', level:'tissue',
      function:'Fewer elastic lamellae than the aorta — adapted for low-pressure flow. Smooth muscle responds to alveolar hypoxia with vasoconstriction (HPV) to optimize V/Q matching — this mechanism is harmful when generalized in COPD.',
      clinical:'In PAH, medial hypertrophy + intimal fibrosis → "onion skin" lesions + plexiform lesions → irreversible PVR elevation. Treatments: PDE5i (sildenafil), ERA (bosentan), prostacyclins (epoprostenol).' }
  }
};

const SIDEBAR_IDS = ['left-ventricle','right-ventricle','left-atrium','right-atrium','aorta','pulmonary-artery'];
const ICONS = { organ:'🫀', region:'🔴', tissue:'🔬', cell:'🧬', organelle:'⚡' };
const BADGE_LABELS = { organ:'Organ', region:'Region', tissue:'Tissue', cell:'Cell', organelle:'Organelle' };

/* ════════════════════════════════════════════════════
   SCENE SETUP
   ════════════════════════════════════════════════════ */
const canvas = document.getElementById('main-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;

const scene = new THREE.Scene();
scene.background = new THREE.Color('#040609');
scene.fog = new THREE.FogExp2('#040609', 0.055);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 120);
camera.position.set(0, 0.5, 9.5);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 3.5;
controls.maxDistance = 22;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.45;
controls.update();

/* ── Lighting ── */
scene.add(new THREE.AmbientLight('#1a0812', 3.5));

const keyLight = new THREE.DirectionalLight('#ffcca0', 4.5);
keyLight.position.set(4, 7, 6);
keyLight.castShadow = true;
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight('#5577ff', 2);
fillLight.position.set(-5, 2, 4);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight('#cc2000', 3);
rimLight.position.set(0, -5, -6);

const innerGlow = new THREE.PointLight('#ff1800', 10, 4.5);

topGlow.position.set(-0.3, 1.8, 0.5);

/* ── Stars ── */
{
  const geo = new THREE.BufferGeometry();
  const n = 3500; const pos = new Float32Array(n * 3);
  for (let i = 0; i < n * 3; i++) pos[i] = (Math.random() - 0.5) * 140;
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));

/* ════════════════════════════════════════════════════
   HEART MODEL
   ════════════════════════════════════════════════════ */
const heartGroup = new THREE.Group();
scene.add(heartGroup);

function makeMat(hex, opts = {}) {
  const col = new THREE.Color(hex);
  return new THREE.MeshPhysicalMaterial({
    color: col,
    emissive: col.clone().multiplyScalar(0.22),
    emissiveIntensity: 1,
    roughness: opts.r ?? 0.45,
    metalness: opts.m ?? 0.08,
    transparent: opts.t ?? false,
    opacity: opts.o ?? 1,
  });
}

const meshMap = {};

function addMesh(id, geo, mat, pos, scl = [1,1,1]) {
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(...pos);
  mesh.scale.set(...scl);
  mesh.userData.sid = id;
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  heartGroup.add(mesh);
  if (id) meshMap[id] = mesh;
  return mesh;
}

/* Body */
const bodyGeo = new THREE.SphereGeometry(1.58, 64, 64);
const bPos = bodyGeo.attributes.position;
for (let i = 0; i < bPos.count; i++) {
  let x = bPos.getX(i), y = bPos.getY(i), z = bPos.getZ(i);
  const ny = (y + 1.58) / 3.16;           // 0 bottom → 1 top
  const taper = 0.78 + ny * 0.22;         // narrow apex
  const pFlatten = z < 0 ? 1 + z * 0.1 : 1; // flatten posterior
  bPos.setXYZ(i, x * taper * pFlatten, y * 0.875, z * taper * 0.9);
}
bodyGeo.computeVertexNormals();
addMesh(null, bodyGeo, makeMat('#560e0e', { r:0.62, m:0.04 }), [0, 0, 0]);

/* Chambers */
addMesh('left-ventricle',  new THREE.SphereGeometry(0.84, 32, 32), makeMat('#dc2626', {r:.28}), [-0.44, -0.46, 0.56]);
addMesh('right-ventricle', new THREE.SphereGeometry(0.66, 32, 32), makeMat('#991b1b', {r:.28}), [ 0.56, -0.36, 0.46]);
addMesh('left-atrium',     new THREE.SphereGeometry(0.53, 32, 32), makeMat('#ef4444', {r:.32}), [-0.50,  0.80,-0.22]);
addMesh('right-atrium',    new THREE.SphereGeometry(0.47, 32, 32), makeMat('#f87171', {r:.32}), [ 0.56,  0.80,-0.12]);

/* Aorta */
{
  const path = new THREE.CatmullRomCurve3([

/* Pulmonary artery */

/* Coronary arteries (decorative) */
function coronary(pts, col) {
  const curve = new THREE.CatmullRomCurve3(pts.map(([a,b,c]) => new THREE.Vector3(a,b,c)));
  const mat = new THREE.MeshPhysicalMaterial({ color: col, roughness:.2, metalness:.28, emissive: new THREE.Color(col).multiplyScalar(.18) });
  heartGroup.add(new THREE.Mesh(new THREE.TubeGeometry(curve, 40, 0.04, 6, false), mat));
}
coronary([[0,.72,1.42],[-.38,.32,1.46],[-.90,-.20,1.10],[-1.18,-.68,.60],[-.90,-1.18,.22]], '#ff9999');
coronary([[.22,.62,1.36],[.68,.10,1.06],[1.20,-.34,.66],[1.30,-.84,.22],[1.0,-1.24,.02]], '#ffaaaa');
coronary([[-.38,.32,1.46],[-.88,.06,.86],[-1.34,-.14,.26],[-1.24,-.44,-.24],[-.80,-.74,-.44]], '#ff8888');

/* Superior vena cava */
{
  const path = new THREE.CatmullRomCurve3([

  ]);

}

/* Pulmonary veins */
[
  [[-0.68, 1.02,-1.10],[-0.54,.90,-.58],[-0.44,.88,-.44]],
  [[-0.64, 0.66,-1.10],[-0.52,.66,-.58],[-0.44,.70,-.42]],
  [[-0.24, 1.02,-1.10],[-0.36,.90,-.58],[-0.42,.88,-.40]],
  [[-0.20, 0.66,-1.10],[-0.32,.66,-.58],[-0.40,.70,-.36]],
].forEach(pts => {
  const curve = new THREE.CatmullRomCurve3(pts.map(([a,b,c]) => new THREE.Vector3(a,b,c)));
  heartGroup.add(new THREE.Mesh(new THREE.TubeGeometry(curve, 12, 0.10, 8, false), makeMat('#dc2626',{r:.42,t:true,o:.82})));

/* Slight anatomical tilt */
heartGroup.rotation.set(0.12, 0, -0.28);

/* ════════════════════════════════════════════════════
   STATE
   ════════════════════════════════════════════════════ */
let selectedId = null;
let hoveredId  = null;
let depth      = 0; // 0=organ, 1=region, 2=tissue

/* ════════════════════════════════════════════════════
   EMISSIVE HELPERS
   ════════════════════════════════════════════════════ */
function setEm(id, hexColor, intensity) {
  const mesh = meshMap[id];
  if (!mesh?.material) return;
  mesh.material.emissive.set(hexColor);
  mesh.material.emissiveIntensity = intensity;
}

function resetEm(id) {
  const mesh = meshMap[id];
  if (!mesh?.material) return;
  const d = DATA[id];
  const col = d ? new THREE.Color(d.color).multiplyScalar(.22) : new THREE.Color(.1,.04,.04);
  mesh.material.emissive.copy(col);
  mesh.material.emissiveIntensity = 1;
}

/* ════════════════════════════════════════════════════
   CAMERA ANIMATION
   ════════════════════════════════════════════════════ */
function animCam(toPos, toTgt, dur = 1.2) {
  controls.autoRotate = false;
  const fromPos = camera.position.clone();
  const fromTgt = controls.target.clone();
  let t = 0;
  const step = () => {
    t = Math.min(t + 0.016 / dur, 1);
    const e = t < .5 ? 2*t*t : -1 + (4 - 2*t)*t;
    camera.position.lerpVectors(fromPos, toPos, e);
    controls.target.lerpVectors(fromTgt, toTgt, e);
    controls.update();
    if (t < 1) requestAnimationFrame(step);
  };
  step();
}

function resetCam() {
  animCam(new THREE.Vector3(0, .5, 9.5), new THREE.Vector3(0,0,0), 1.0);
  setTimeout(() => { controls.autoRotate = true; }, 1100);
}

/* ════════════════════════════════════════════════════
   UI
   ════════════════════════════════════════════════════ */
function setZoom(level) {
  document.querySelectorAll('.zl-item').forEach(el =>
    el.classList.toggle('active', el.dataset.level === level));
}

function setBreadcrumb(items) {
  const bc = document.getElementById('breadcrumb');
  bc.innerHTML = items.map(({id, name}, i) => `
    ${i > 0 ? '<span class="bc-sep">›</span>' : ''}
    <span class="bc-item ${i === items.length-1 ? 'current' : ''}" data-id="${id}">${name}</span>
  `).join('');
  bc.querySelectorAll('.bc-item').forEach(el => {
    el.addEventListener('click', () => { if (el.dataset.id === 'heart') climbOut(); });
  });
}

function openPanel(d) {
  const p = document.getElementById('info-panel');
  document.getElementById('ip-badge').textContent = `${ICONS[d.level]} ${BADGE_LABELS[d.level]}`;
  document.getElementById('ip-badge').className = `ip-badge ${d.level}`;
  document.getElementById('ip-name').textContent  = d.name;
  document.getElementById('ip-latin').textContent = d.latinName;
  document.getElementById('ip-fn').textContent    = d.function;
  document.getElementById('ip-clin').textContent  = d.clinical;

  const diveBtn = document.getElementById('btn-dive');
  const backBtn = document.getElementById('btn-back');
  diveBtn.style.display = d.tissue ? 'flex' : 'none';
  backBtn.style.display = (d.level !== 'organ') ? 'flex' : 'none';
  p.classList.add('open');
}

function closePanel() {
  document.getElementById('info-panel').classList.remove('open');
}

function buildSidebar(activeId) {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '<div class="sb-label">Structures</div>';
  SIDEBAR_IDS.forEach(id => {
    const d = DATA[id];
    const btn = document.createElement('button');
    btn.className = `sb-btn${id === activeId ? ' active' : ''}`;
    btn.innerHTML = `
      <div class="sb-dot" style="background:${d.color}"></div>
      <div>
        <div class="sb-name">${d.name}</div>
        <div class="sb-level">${d.level}</div>
      </div>`;
    btn.addEventListener('click', () => selectStructure(id));
    sb.appendChild(btn);
  });
}

/* ════════════════════════════════════════════════════
   SELECTION
   ════════════════════════════════════════════════════ */
function selectStructure(id) {
  if (selectedId) resetEm(selectedId);
  selectedId = id;
  depth = 1;
  const d = DATA[id];
  if (!d) return;

  setEm(id, '#ff6b6b', 1.3);
  openPanel(d);
  setBreadcrumb([{id:'heart',name:'Heart'},{id,name:d.name}]);
  setZoom('region');
  buildSidebar(id);
  controls.autoRotate = false;

  const mesh = meshMap[id];
  if (mesh) {
    const wp = new THREE.Vector3();
    mesh.getWorldPosition(wp);
    const dir = wp.clone().normalize();
    const cam = wp.clone().add(dir.multiplyScalar(4.8));
    cam.y += 0.3;
    animCam(cam, wp);
  }
}

window.climbOut = function() {
  if (selectedId) resetEm(selectedId);
  selectedId = null;
  depth = 0;
  closePanel();
  setBreadcrumb([{id:'heart',name:'Heart'}]);
  setZoom('organ');
  buildSidebar(null);
  resetCam();
};

window.diveIn = function() {
  if (!selectedId || !DATA[selectedId]?.tissue) return;
  const rd = DATA[selectedId];
  const td = rd.tissue;
  depth = 2;

  openPanel({
    name: td.name, latinName: td.latinName, level: td.level,
    function: td.function, clinical: td.clinical,
    tissue: null // no deeper level in PoC
  });
  setBreadcrumb([
    {id:'heart',name:'Heart'},
    {id:selectedId,name:rd.name},
    {id:'tissue',name:td.name}
  ]);
  setZoom('tissue');

  const mesh = meshMap[selectedId];
  if (mesh) {
    const wp = new THREE.Vector3();
    mesh.getWorldPosition(wp);
    const dir = wp.clone().normalize();
    animCam(wp.clone().add(dir.multiplyScalar(2.2)), wp, 1.5);
  }
  setEm(selectedId, '#ff2200', 2.2);
};

document.getElementById('btn-dive').addEventListener('click', window.diveIn);
document.getElementById('btn-back').addEventListener('click', window.climbOut);

/* ════════════════════════════════════════════════════
   RAYCASTING
   ════════════════════════════════════════════════════ */
const raycaster  = new THREE.Raycaster();
const mouse      = new THREE.Vector2();
const tooltip    = document.getElementById('tooltip');
const iMeshes    = Object.values(meshMap);

let downXY = {x:0, y:0}, dragging = false;

renderer.domElement.addEventListener('mousedown', e => { downXY = {x:e.clientX, y:e.clientY}; dragging = false; });

renderer.domElement.addEventListener('mousemove', e => {
  if (Math.hypot(e.clientX-downXY.x, e.clientY-downXY.y) > 4) dragging = true;

  mouse.set((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(iMeshes, false);

  if (hits.length) {
    const id = hits[0].object.userData.sid;
    if (id && DATA[id]) {
      if (id !== hoveredId) {
        if (hoveredId && hoveredId !== selectedId) resetEm(hoveredId);
        hoveredId = id;
        if (id !== selectedId) setEm(id, '#ffffff', 0.28);
        tooltip.textContent = DATA[id].name;
      }
      tooltip.style.left = (e.clientX+14)+'px';
      tooltip.style.top  = (e.clientY-34)+'px';
      tooltip.style.opacity = '1';
      renderer.domElement.style.cursor = 'pointer';
    }
  } else {
    if (hoveredId && hoveredId !== selectedId) resetEm(hoveredId);
    hoveredId = null;
    tooltip.style.opacity = '0';
    renderer.domElement.style.cursor = 'default';
  }
});

renderer.domElement.addEventListener('click', e => {
  if (dragging) return;
  mouse.set((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(iMeshes, false);
  if (hits.length) {
    const id = hits[0].object.userData.sid;
    if (id && DATA[id]) selectStructure(id);
  } else {
    climbOut();
  }
});

window.addEventListener('keydown', e => {
  if (e.key === 'r' || e.key === 'R' || e.key === 'Escape') climbOut();
});

/* ════════════════════════════════════════════════════
   HEARTBEAT ANIMATION
   ════════════════════════════════════════════════════ */
let beatCycle = 0;

function heartbeat(dt) {
  beatCycle += dt * 1.32; // ~79 bpm
  if (beatCycle > Math.PI*2) beatCycle -= Math.PI*2;
  const t = beatCycle / (Math.PI*2);
  let s = 1.0;
  if (t < 0.07)  s = 1 + Math.sin(t/0.07*Math.PI) * 0.038;       // systole
  else if (t < 0.14) s = 1 + Math.sin((t-.07)/.07*Math.PI) * 0.018; // dicrotic
  heartGroup.scale.setScalar(s);
  innerGlow.intensity = 8 + Math.sin(beatCycle) * 2.5;
}

/* ════════════════════════════════════════════════════
   ECG
   ════════════════════════════════════════════════════ */
const ecgCanvas = document.getElementById('ecg');
const ecgCtx    = ecgCanvas.getContext('2d');
let ecgOff = 0;

function drawECG() {
  const W = window.innerWidth, H = 52;
  ecgCanvas.width  = W;
  ecgCanvas.height = H;
  ecgOff = (ecgOff + 2.8) % 320;

  ecgCtx.clearRect(0, 0, W, H);
  ecgCtx.beginPath();
  ecgCtx.strokeStyle = '#ef4444';
  ecgCtx.lineWidth   = 1.6;
  ecgCtx.lineCap = ecgCtx.lineJoin = 'round';

  const MID = H / 2;
  for (let x = 0; x < W; x++) {
    const t = ((x + ecgOff) % 320) / 320;
    let y = MID;
    if (t > .05 && t < .12)   y -= Math.sin((t-.05)/.07*Math.PI) * 7;
    else if (t > .18 && t < .19) y += 3.5;
    else if (t > .19 && t < .225) y -= Math.sin((t-.19)/.035*Math.PI) * 34;
    else if (t > .225 && t < .245) y += 5;
    else if (t > .30 && t < .46)  y -= Math.sin((t-.30)/.16*Math.PI) * 11;
    if (x === 0) ecgCtx.moveTo(x, y); else ecgCtx.lineTo(x, y);
  }
  ecgCtx.stroke();
}

/* ════════════════════════════════════════════════════
   RESIZE
   ════════════════════════════════════════════════════ */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ════════════════════════════════════════════════════
   INIT
   ════════════════════════════════════════════════════ */
buildSidebar(null);
setBreadcrumb([{id:'heart',name:'Heart'}]);
setZoom('organ');

setTimeout(() => {
  document.getElementById('loading').classList.add('done');
  setTimeout(() => openPanel(DATA.heart), 650);
}, 1800);

/* ════════════════════════════════════════════════════
   RENDER LOOP
   ════════════════════════════════════════════════════ */
let prev = performance.now();
(function loop() {
  requestAnimationFrame(loop);
  const now = performance.now();
  const dt  = Math.min((now - prev) / 1000, 0.05);
  prev = now;
  controls.update();
  heartbeat(dt);
  drawECG();
  renderer.render(scene, camera);
})();
</script>
